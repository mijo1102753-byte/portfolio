<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="image.css" />
    <title>이미지 타입</title>
  </head>
  <body>
    <section id="imageType" class="section">
      <h1 class="blind">이미지 유형 만들기</h1>
      <h2>프리미어 케이크와 디저트를 만나보세요</h2>
      <p>유러피언 디저트의 본질을 추구한 고급 원재료와 차별화된 레시피</p>
      <div class="image_inner container">
        <article class="image img1">
          <h3 class="image_title">베리밤 레드 케이크</h3>
          <p class="image_desc">
            강렬한 레드시트에 고소한 생크림과 상큼한 딸기 콤포트를 샌드하고 신선한 생딸기를 가득 올린 케이크 콤포트를
            샌드하고 신선한 생딸기를 가득 올린 케이크
          </p>
          <p class="image_btn">자세히 보기</p>
        </article>
        <article class="image img2">
          <h3 class="image_title">스트로베리 초콜릿 생크림</h3>
          <p class="image_desc">
            한가득 올린 상큼한 딸기, 크런치 초코볼이 초콜릿 생크림 사이사이 씹히는 투썸 시그니처 케이크 사이사이 씹히는
            투썸 시그니처 케이크
          </p>
          <p class="image_btn choco">자세히 보기</p>
        </article>
      </div>
    </section>
  </body>
</html>
